project_name: adhd
version: 2
before:
  hooks:
    - go mod download
builds:
  - id: adhd
    main: ./cmd/adhd
    binary: adhd
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: checksums.txt
snapshot:
  name_template: "{{ .Tag }}-next"
release:
  github:
    owner: james-gibson
    name: adhd
