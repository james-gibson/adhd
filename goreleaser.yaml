project_name: adhd
version: 2
before:
  hooks:
    - go mod download
builds:
  - id: adhd
    main: ./cmd/adhd
    binary: adhd
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  - id: default
    format: tar.gz
checksum:
  name_template: checksums.txt
release:
  github:
    owner: james-gibson
    name: adhd